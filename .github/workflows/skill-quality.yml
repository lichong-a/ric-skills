name: Skill Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s scripts -p "test_*.py" -v
      - name: Check generated registries
        run: python scripts/generate-registries.py --check
      - name: Run deterministic evals
        run: python scripts/run-deterministic-evals.py
      - name: Run repository validator
        run: python scripts/validate-skills.py --warnings-as-errors
      - name: Run PowerShell wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/validate-skills.ps1 -WarningsAsErrors
      - name: Run Bash wrapper
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/validate-skills.sh --warnings-as-errors
